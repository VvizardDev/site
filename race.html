<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Legally Distinct Jetbike Racing</title>

<style>

body {
  margin: 0;
  padding: 20px;
  background: #0b0f1a;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

.track {
  position: relative;
  width: 95%;
  max-width: 1000px;
  height: 300px;
  margin: 20px auto;
  background: #111a2e;
  border: 2px solid #2a3b5f;
  overflow: hidden;
}

.finish-line {
  position: absolute;
  right: 40px;
  top: 0;
  width: 6px;
  height: 100%;
  background: white;
  z-index: 2;
}

.lane {
  position: relative;
  height: 33.333%;
  border-bottom: 1px dashed #2a3b5f;
}

.bike {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 22px;
  border-radius: 10px;
  z-index: 10;
}

#bike0 { background: #ff3b3b; }
#bike1 { background: #3bff7a; }
#bike2 { background: #3b8bff; }

.segment-line {
  position: absolute;
  top: 0;
  width: 4px;
  height: 100%;
  background: rgba(255,255,255,0.2);
}

.segment-label {
  position: absolute;
  top: 5px;
  transform: translateX(-50%);
  font-size: 12px;
  color: #ffd166;
  background: rgba(0,0,0,0.6);
  padding: 2px 6px;
  border-radius: 4px;
}

button, input {
  padding: 10px 14px;
  margin: 5px;
  font-size: 15px;
}

#log {
  width: 95%;
  max-width: 1000px;
  height: 180px;
  overflow-y: auto;
  margin: 20px auto;
  background: #111a2e;
  border: 1px solid #2a3b5f;
  padding: 10px;
  text-align: left;
}

#result {
  margin-top: 15px;
  font-size: 20px;
  min-height: 30px;
}

button:disabled,
input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

</style>
</head>

<body>

<h1>Jetbike Racing</h1>

<div>
  Balance: ₹<span id="balance">100</span>
</div>

<div>
  Racetrack:
  <span id="seedDisplay"></span>
</div>

<div id="coursePreview"></div>

<div>
  <p>Select Bike:</p>

  <button onclick="selectBike(0)">Red (Ground)</button>
  <button onclick="selectBike(1)">Green (Webway)</button>
  <button onclick="selectBike(2)">Blue (Air)</button>
</div>

<div>
  Bet Amount:
  <input id="bet" type="number" min="1" value="10"/>
</div>

<button onclick="startRace()">Start Race</button>

<div class="track" id="track">

  <div class="finish-line"></div>

  <div class="lane">
    <div class="bike" id="bike0"></div>
  </div>

  <div class="lane">
    <div class="bike" id="bike1"></div>
  </div>

  <div class="lane">
    <div class="bike" id="bike2"></div>
  </div>

</div>

<div id="result"></div>

<div id="log"></div>

<script>

/* =========================================
   DETERMINISTIC RNG
========================================= */

function getSeedForSlot(slot) {

  const d = new Date(slot * SLOT_MS);

  const minute =
    Math.floor(d.getMinutes() / 5) * 5;

  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}-${d.getHours()}-${minute}`;
}

function hashSeed(str) {

  let h = 2166136261;

  for (let i = 0; i < str.length; i++) {

    h ^= str.charCodeAt(i);

    h = Math.imul(h, 16777619);
  }

  return h >>> 0;
}

function mulberry32(a) {

  return function() {

    let t = a += 0x6D2B79F5;

    t = Math.imul(
      t ^ (t >>> 15),
      t | 1
    );

    t ^= t + Math.imul(
      t ^ (t >>> 7),
      t | 61
    );

    return (
      ((t ^ (t >>> 14)) >>> 0)
      / 4294967296
    );
  }
}

function createRNG(seed) {

  const rng =
    mulberry32(hashSeed(seed));

  return {
    rand: () => rng(),
    randInt: (n) =>
      Math.floor(rng() * n)
  };
}

/* =========================================
   DATA
========================================= */

const SIM_DISTANCE = 1000;
const FRAME_MS = 30;

const terrainTypes = [
  "Air",
  "Deathtraps",
  "Ground",
  "Webway",
  "Strait"
];

const racers = [

  {
    name: "Red",
    specialty: "Ground",
    temperament: "Speedster"
  },

  {
    name: "Green",
    specialty: "Webway",
    temperament: "Combative"
  },

  {
    name: "Blue",
    specialty: "Air",
    temperament: "Speedster"
  }
];

/* =========================================
   STATE
========================================= */

let selected = null;
let currentCourse = [];
let currentRaceData = null;

let balance =
  parseInt(localStorage.getItem("balance") || "100");

document.getElementById("balance").textContent =
  balance;

/* =========================================
   SLOT SYSTEM
========================================= */

const SLOT_MS = 5 * 60 * 1000;

function getSlot(now = Date.now()) {
  return Math.floor(now / SLOT_MS);
}

function getNextSlotTime() {
  return (getSlot() + 1) * SLOT_MS;
}

function getCooldownRemaining() {
  return Math.max(
    0,
    getNextSlotTime() - Date.now()
  );
}

let lastBetSlot =
  parseInt(
    localStorage.getItem("lastBetSlot") || "-1"
  );

let cooldownInterval = null;
let racing = false;

/* =========================================
   HELPERS
========================================= */

function saveBalance() {

  localStorage.setItem("balance", balance);

  document.getElementById("balance").textContent =
    balance;
}

function logMessage(msg) {

  const log = document.getElementById("log");

  log.innerHTML += msg + "<br>";

  log.scrollTop = log.scrollHeight;
}

function selectBike(i) {

  selected = i;

  document.getElementById("result").textContent =
    "Selected: " + racers[i].name;
}

function resetPositions() {

  for (let i = 0; i < 3; i++) {

    document.getElementById("bike" + i).style.left =
      "0px";
  }
}

function setRaceState(state) {

  racing = state;

  document
    .querySelectorAll("button,input")
    .forEach(el => {
      el.disabled = state;
    });
}

function applyCooldownUI() {

  setRaceState(true);

  updateCooldownMessage();

  if (cooldownInterval) {
    clearInterval(cooldownInterval);
  }

  cooldownInterval =
    setInterval(
      updateCooldownMessage,
      1000
    );
}

function updateCooldownMessage() {

  const remaining =
    getCooldownRemaining();

  const mins =
    Math.ceil(remaining / 60000);

  let el =
    document.getElementById("cooldown");

  if (!el) {

    el = document.createElement("div");

    el.id = "cooldown";

    el.style.marginTop = "10px";

    el.style.color = "#ffd166";

    document.body.insertBefore(
      el,
      document.querySelector(".track")
    );
  }

  if (remaining <= 0) {

    el.textContent = "";

    clearInterval(cooldownInterval);

    cooldownInterval = null;

    setRaceState(false);

    return;
  }

  el.textContent =
    `refresh this page in ${mins} minutes for the next race`;
}

/* =========================================
   COURSE
========================================= */

function generateCourse(seed) {

  const rng = createRNG(seed);

  currentCourse = [];

  const count =
    rng.randInt(2) + 3;

  for (let i = 0; i < count; i++) {

    currentCourse.push(
      terrainTypes[
        rng.randInt(terrainTypes.length)
      ]
    );
  }

  renderTrackSegments();
}

function renderTrackSegments() {

  const track =
    document.getElementById("track");

  document
    .querySelectorAll(".segment-line,.segment-label")
    .forEach(el => el.remove());

  const visualWidth =
    track.clientWidth - 40;

  const segmentWidth =
    visualWidth / currentCourse.length;

  currentCourse.forEach((seg, i) => {

    const x = segmentWidth * (i + 1);

    const line = document.createElement("div");

    line.className = "segment-line";

    line.style.left = x + "px";

    track.appendChild(line);

    const label = document.createElement("div");

    label.className = "segment-label";

    label.style.left =
      (x - segmentWidth / 2) + "px";

    label.textContent = seg;

    track.appendChild(label);
  });
}

/* =========================================
   PURE DETERMINISTIC SIMULATION
========================================= */

function simulateRace(seed) {

  const rng = createRNG(seed);

  const positions = [0,0,0];

  const turboUntil = [0,0,0];
  const stunUntil = [0,0,0];

  const baseSpeeds = [

    rng.rand() * 1.5 + 1.5,
    rng.rand() * 1.5 + 1.5,
    rng.rand() * 1.5 + 1.5
  ];

  const segmentSize =
    SIM_DISTANCE / currentCourse.length;

  const frames = [];

  const eventLog = [];

  let winner = null;

  for (let tick = 0; tick < 5000; tick++) {

    const currentLeader =
      Math.max(...positions);

    const segmentIndex =
      Math.min(
        Math.floor(currentLeader / segmentSize),
        currentCourse.length - 1
      );

    const terrain =
      currentCourse[segmentIndex];

    for (let i = 0; i < 3; i++) {

      if (tick < stunUntil[i]) {
        continue;
      }

      let speed =
        baseSpeeds[i] +
        rng.rand() * 1.2;

      /* TURBO */

      if (
        racers[i].temperament ===
        "Speedster"
      ) {

        if (rng.randInt(90) === 0) {

          turboUntil[i] = tick + 14;

          eventLog.push({
            tick,
            msg:
              "⚡ " +
              racers[i].name +
              " TURBO!"
          });
        }
      }

      if (tick < turboUntil[i]) {
        speed *= 1.5;
      }

      /* TERRAIN BONUS */

      if (
        racers[i].specialty === terrain
      ) {
        speed += 1.8;
      }

      /* STRAIT */

      if (terrain === "Strait") {
        speed *= 1.15;
      }

      /* DEATHTRAPS */

      if (terrain === "Deathtraps") {

        if (rng.randInt(140) === 0) {

          stunUntil[i] = tick + 28;

          positions[i] *= 0.82;

          eventLog.push({
            tick,
            msg:
              "💥 " +
              racers[i].name +
              " hits a deathtrap!"
          });

        } else if (
          rng.randInt(50) === 0
        ) {

          speed *= 0.55;

          eventLog.push({
            tick,
            msg:
              "☠ " +
              racers[i].name +
              " struggles through traps"
          });
        }
      }

      /* ATTACK */

      if (
        racers[i].temperament ===
        "Combative"
      ) {

        if (rng.randInt(110) === 0) {

          let target = -1;
          let best = Infinity;

          for (let j = 0; j < 3; j++) {

            if (j === i) continue;

            const d =
              Math.abs(
                positions[j] -
                positions[i]
              );

            if (d < best) {

              best = d;
              target = j;
            }
          }

          if (target !== -1) {

            stunUntil[target] =
              tick + 10;

            eventLog.push({
              tick,
              msg:
                "⚔ " +
                racers[i].name +
                " attacks " +
                racers[target].name
            });
          }
        }
      }

      /* ACCELERATION */

      const accel =
        Math.min(
          1,
          positions[i] / 220 + 0.35
        );

      speed *= accel;

      positions[i] += speed;

      if (
        positions[i] >= SIM_DISTANCE &&
        winner === null
      ) {
        winner = i;
      }
    }

    frames.push({
      positions: [...positions]
    });

    if (winner !== null) {
      break;
    }
  }

  return {
    frames,
    winner,
    eventLog
  };
}

/* =========================================
   VISUAL REPLAY
========================================= */

function playRace(data, bet) {

  const visualWidth =
    document.querySelector(".track")
      .clientWidth - 90;

  let frameIndex = 0;

  const result =
    document.getElementById("result");

  result.textContent = "";

  document.getElementById("log").innerHTML = "";

  function renderFrame() {

    if (frameIndex >= data.frames.length) {

      const winner = data.winner;

      if (winner === selected) {

        const winnings = bet * 2;

        balance += winnings;

        saveBalance();

        result.textContent =
          "🏆 Winner: " +
          racers[winner].name +
          " — Won ₹" + winnings;

      } else {

        result.textContent =
          "💀 Winner: " +
          racers[winner].name +
          " — Lost ₹" + bet;
      }

      applyCooldownUI();

      return;
    }

    const frame =
      data.frames[frameIndex];

    /* POSITIONS */

    for (let i = 0; i < 3; i++) {

      const renderX =
        (frame.positions[i] / SIM_DISTANCE)
        * visualWidth;

      document.getElementById("bike" + i)
        .style.left = renderX + "px";
    }

    /* EVENTS */

    data.eventLog
      .filter(e => e.tick === frameIndex)
      .forEach(e => logMessage(e.msg));

    frameIndex++;

    setTimeout(() => {
      requestAnimationFrame(renderFrame);
    }, FRAME_MS);
  }

  renderFrame();
}

/* =========================================
   START RACE
========================================= */

function startRace() {

  if (racing) {
    return;
  }

  if (selected === null) {
    return;
  }

  const slot = getSlot();

  /* LOCK */

  if (slot === lastBetSlot) {

    applyCooldownUI();

    return;
  }

  const bet =
    parseInt(
      document.getElementById("bet").value
    );

  if (!bet || bet > balance) {
    return;
  }

  const seed =
    getSeedForSlot(slot);

  /* SAME SHARED RACE */

  generateCourse(seed);

  currentRaceData =
    simulateRace(seed);

  /* LOCK SLOT */

  lastBetSlot = slot;

  localStorage.setItem(
    "lastBetSlot",
    lastBetSlot
  );

  balance -= bet;

  saveBalance();

  resetPositions();

  setRaceState(true);

  playRace(currentRaceData, bet);
}

/* =========================================
   INIT
========================================= */

/* =========================================
   INIT
========================================= */

/* POVERTY RECOVERY */

if (balance <= 0) {

  balance = 2;

  saveBalance();

  setTimeout(() => {

    logMessage(
      "Penniless, you do some mercenary work and earn ₹2"
    );

  }, 50);
}

const initSlot =
  getSlot();

const initSeed =
  getSeedForSlot(initSlot);

document.getElementById(
  "seedDisplay"
).textContent = initSeed;

/* shared race generation */

generateCourse(initSeed);

currentRaceData =
  simulateRace(initSeed);

/* restore lock state */

if (initSlot === lastBetSlot) {
  applyCooldownUI();
}

window.addEventListener(
  "resize",
  renderTrackSegments
);

</script>

</body>
</html>
